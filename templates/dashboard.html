<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PiTemplar Control</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: system-ui,sans-serif; background: linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.75)), url("/static/castle.png") no-repeat center center fixed; background-size: cover; color:#eee; padding:20px; }
.card { background: rgba(20,20,20,0.9); padding:22px; border-radius:10px; max-width:520px; margin-bottom:20px; box-shadow:0 0 18px rgba(0,0,0,0.7);}
h2,h3 { font-family: 'Cinzel', serif; color:#f0e6c8;}
.stat-label { display:flex; align-items:center; gap:8px; font-family:'Cinzel', serif; }
.gauge { background:#333; border-radius:14px; overflow:hidden; margin:6px 0 14px; }
.gauge-inner { height:30px; line-height:30px; padding-right:10px; text-align:right; font-weight:bold; color:#fff; border-radius:14px; transition:width 0.6s; }
button, input { width:100%; margin-top:6px; padding:8px; border-radius:6px; border:none; background:#333; color:#eee; }
button:hover { background:#444; }
pre { background:#222; padding:10px; border-radius:6px; max-height:200px; overflow:auto; }
</style>
</head>
<body>

<div class="card">
    <h2>System Stats</h2>
    <div class="stat-label">⚔️ CPU {{ cpu }}%</div>
    <div class="gauge"><div class="gauge-inner" style="width:{{ cpu }}%;background:#c0392b">{{ cpu }}%</div></div>
    <div class="stat-label">🛡️ Disk {{ disk.used_percent }}%</div>
    <div class="gauge"><div class="gauge-inner" style="width:{{ disk.used_percent }}%;background:#e67e22">{{ disk.used_percent }}%</div></div>
    <div class="stat-label">📜 RAM {{ ram }}%</div>
    <div class="gauge"><div class="gauge-inner" style="width:{{ ram }}%;background:#8e44ad">{{ ram }}%</div></div>
    <div class="stat-label">👥 Users {{ users }}</div>
    <div class="gauge"><div class="gauge-inner" style="width:{{ users }}%;background:#27ae60">{{ users }}</div></div>
</div>

<div class="card">
<h3>Screen Controls</h3>
<button onclick="post('/api/rotate')">Rotate Screen</button>
<button onclick="post('/api/invert')">Invert Screen</button>
<button onclick="rebootSystem()">Reboot System</button>
</div>

<div class="card">
<h3>Change Password</h3>
<input type="password" id="oldpw" placeholder="Current password">
<input type="password" id="newpw" placeholder="New password">
<button onclick="changePassword()">Change Password</button>
<p id="pwstatus"></p>
</div>

<div class="card">
<h3>Command Line Interface</h3>
<input type="text" id="cliCommand" placeholder="Enter command e.g., nmcli dev wifi list">
<button onclick="runCLI()">Run Command</button>
<pre id="cliOutput"></pre>
</div>

<script>
function post(url){ fetch(url,{method:"POST"}); }

async function rebootSystem(){
    if(!confirm("Reboot the system?")) return;
    await fetch("/api/reboot",{method:"POST"});
    alert("Rebooting...");
}

async function changePassword(){
    const r=await fetch("/api/change_password",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({old:oldpw.value,new:newpw.value})
    });
    const d=await r.json();
    pwstatus.textContent=d.ok ? "Password updated" : d.error || "Failed";
}

async function runCLI(){
    const cmd=cliCommand.value.trim();
    if(!cmd) return;
    cliOutput.textContent="Running...";
    try{
        const r=await fetch("/api/cli",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({command:cmd})});
        const d=await r.json();
        cliOutput.textContent=d.ok ? d.output : d.error;
    }catch(e){ cliOutput.textContent="Error: "+e; }
}
</script>

</body>
</html>
